services:
  frontend:
    image: nginx:alpine
    container_name: frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro

  api:
    build: ./api
    container_name: api
    ports:
      - "5000:5000"
    depends_on:
      - auth

  auth:
    build: ./auth
    container_name: auth
    ports:
      - "5001:5001"
